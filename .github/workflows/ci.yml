name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Configure git for tests
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "ci"
      - run: npm test
      - run: npm run test:cov
        if: matrix.node == '24'

  action-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.x'
      - name: Install PyYAML
        run: python -m pip install --upgrade pip pyyaml
      - name: Validate action.yml
        run: bash tests/action-smoke.sh

  # Aggregator: a single, stable name for the ruleset's
  # required-status-checks list. Lets us add/remove matrix entries
  # without re-editing branch protection.
  ci-success:
    if: always()
    needs: [test, action-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Verify upstream jobs succeeded
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}" == "true" ]]; then
            echo "One or more required jobs did not succeed."
            exit 1
          fi
