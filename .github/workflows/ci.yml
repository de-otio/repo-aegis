name: CI
on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded PR runs; let push-to-main runs finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Configure git for tests
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "ci"
      - run: npm test
      - run: npm run test:cov
        if: matrix.node == '24'

  action-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.x'
      - name: Install PyYAML
        run: python -m pip install --upgrade pip pyyaml
      - name: Validate action.yml
        run: bash tests/action-smoke.sh

  # Aggregator: a single, stable name for the ruleset's
  # required-status-checks list. Lets us add/remove matrix entries
  # without re-editing branch protection.
  ci-success:
    if: always()
    needs: [test, action-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Verify upstream jobs succeeded
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}" == "true" ]]; then
            echo "One or more required jobs did not succeed."
            exit 1
          fi
