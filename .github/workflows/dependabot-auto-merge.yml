# SPDX-License-Identifier: GPL-3.0-or-later
# Auto-approve and queue auto-merge for Dependabot PRs whose update-type
# is patch or minor. Major bumps stay manual on purpose: even
# semver-respecting ecosystems use majors to ship breaking changes.
#
# The merge does NOT happen here — `gh pr merge --auto` only enables
# GitHub's queued auto-merge, which fires once the required status
# checks on `main` (configured in the "Protect main" ruleset) all pass.
# So "tests pass" is enforced by the ruleset, not by this workflow.
#
# Why a PAT instead of GITHUB_TOKEN: the ruleset requires a code-owner
# approval, and reviews from `github-actions[bot]` don't satisfy that.
# AUTO_MERGE_TOKEN must be a fine-grained PAT owned by a code owner,
# scoped to this repo, with "Pull requests: read & write" + "Contents:
# read & write".
#
# Why pull_request_target: needed so the job can read the
# AUTO_MERGE_TOKEN secret. Safe here because we never check out or run
# code from the PR — we only call `gh` against the PR's metadata.

name: Dependabot auto-merge

on: pull_request_target

permissions:
  contents: read
  pull-requests: read

jobs:
  auto-merge:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve PR
        if: contains(fromJSON('["version-update:semver-patch","version-update:semver-minor"]'), steps.meta.outputs.update-type)
        env:
          GH_TOKEN: ${{ secrets.AUTO_MERGE_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr review --approve "$PR_URL"

      - name: Enable auto-merge
        if: contains(fromJSON('["version-update:semver-patch","version-update:semver-minor"]'), steps.meta.outputs.update-type)
        env:
          GH_TOKEN: ${{ secrets.AUTO_MERGE_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
