# SPDX-License-Identifier: GPL-3.0-or-later
# GitHub CodeQL — static analysis. Runs on PRs targeting main, on
# push to main, and weekly to catch advisories that land on already-
# merged code.
#
# The "javascript-typescript" language covers both — CodeQL handles
# them under one analysis pipeline since the v3 action.

name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Mondays at 06:00 UTC

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: analyze (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          category: "/language:${{ matrix.language }}"

  # Aggregator: stable check-run name for branch-protection. The
  # matrix expands `analyze` into ugly doubled names like
  # `analyze (javascript-typescript) (javascript-typescript)`, which
  # we don't want to pin in the ruleset.
  codeql-success:
    if: always()
    needs: [analyze]
    runs-on: ubuntu-latest
    steps:
      - name: Verify analyze job succeeded
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}" == "true" ]]; then
            echo "CodeQL analyze did not succeed."
            exit 1
          fi
