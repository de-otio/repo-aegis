# SPDX-License-Identifier: GPL-3.0-or-later
# GitHub CodeQL — static analysis. Runs on PRs targeting main, on
# push to main, and weekly to catch advisories that land on already-
# merged code.
#
# The "javascript-typescript" language covers both — CodeQL handles
# them under one analysis pipeline since the v3 action.

name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Mondays at 06:00 UTC

# Cancel superseded PR runs; let push/scheduled runs finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: analyze (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"

  # Aggregator: stable check-run name for branch-protection. The
  # matrix expands `analyze` into ugly doubled names like
  # `analyze (javascript-typescript) (javascript-typescript)`, which
  # we don't want to pin in the ruleset.
  codeql-success:
    if: always()
    needs: [analyze]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Verify analyze job succeeded
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}" == "true" ]]; then
            echo "CodeQL analyze did not succeed."
            exit 1
          fi
